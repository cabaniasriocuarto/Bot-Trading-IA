name: Staging Smoke (GitHub VM)

on:
  schedule:
    - cron: "20 5 * * *"
  workflow_dispatch:
    inputs:
      backend_base_url:
        description: Backend staging base URL
        required: true
        default: https://bot-trading-ia-staging.up.railway.app
        type: string
      frontend_login_url:
        description: Frontend staging login URL
        required: true
        default: https://bot-trading-ia-staging-2.vercel.app/login
        type: string
      username:
        description: Admin username
        required: true
        default: Wadmin
        type: string
      timeout_sec:
        description: HTTP timeout seconds
        required: true
        default: 20
        type: number
      require_auth_checks:
        description: Require authenticated /api/v1/bots checks
        required: true
        default: true
        type: boolean
      strict:
        description: Fail workflow when smoke checks fail
        required: true
        default: true
        type: boolean
      include_beast_probe:
        description: Run authenticated Beast/data runtime probe
        required: true
        default: true
        type: boolean
      include_beast_e2e:
        description: Run authenticated Beast E2E BTCUSDT test
        required: true
        default: false
        type: boolean
      bootstrap_dataset:
        description: Bootstrap crypto public dataset before Beast probe
        required: true
        default: false
        type: boolean
      bootstrap_start_month:
        description: Bootstrap start month (YYYY-MM)
        required: false
        default: 2024-01
        type: string
      bootstrap_end_month:
        description: Bootstrap end month (YYYY-MM)
        required: false
        default: 2024-12
        type: string
      beast_strategy_id:
        description: Strategy id for Beast E2E
        required: false
        default: trend_pullback_orderflow_confirm_v1
        type: string
      beast_use_orderflow_data:
        description: Use orderflow data in Beast E2E
        required: true
        default: false
        type: boolean
      beast_max_wait_sec:
        description: Max wait seconds for Beast E2E terminal state
        required: true
        default: 180
        type: number

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Validate auth configuration
        env:
          REQUIRE_AUTH: ${{ github.event_name == 'schedule' && 'true' || inputs.require_auth_checks }}
          RTLAB_ADMIN_PASSWORD: ${{ secrets.RTLAB_ADMIN_PASSWORD }}
          RTLAB_AUTH_TOKEN: ${{ secrets.RTLAB_AUTH_TOKEN }}
          RTLAB_STAGING_ADMIN_PASSWORD: ${{ secrets.RTLAB_STAGING_ADMIN_PASSWORD }}
          RTLAB_STAGING_AUTH_TOKEN: ${{ secrets.RTLAB_STAGING_AUTH_TOKEN }}
        run: |
          selected_auth_token="${RTLAB_STAGING_AUTH_TOKEN:-}"
          selected_admin_password="${RTLAB_STAGING_ADMIN_PASSWORD:-}"
          if [[ "${REQUIRE_AUTH}" == "true" && -z "${selected_admin_password}" && -z "${selected_auth_token}" ]]; then
            echo "Missing staging secrets: set RTLAB_STAGING_AUTH_TOKEN or RTLAB_STAGING_ADMIN_PASSWORD." >&2
            exit 1
          fi

      - name: Run staging smoke
        env:
          BACKEND_BASE_URL: ${{ github.event_name == 'schedule' && 'https://bot-trading-ia-staging.up.railway.app' || inputs.backend_base_url }}
          FRONTEND_LOGIN_URL: ${{ github.event_name == 'schedule' && 'https://bot-trading-ia-staging-2.vercel.app/login' || inputs.frontend_login_url }}
          USERNAME: ${{ github.event_name == 'schedule' && 'Wadmin' || inputs.username }}
          TIMEOUT_SEC: ${{ github.event_name == 'schedule' && 20 || inputs.timeout_sec }}
          REQUIRE_AUTH: ${{ github.event_name == 'schedule' && 'true' || inputs.require_auth_checks }}
          STRICT: ${{ github.event_name == 'schedule' && 'true' || inputs.strict }}
          RTLAB_ADMIN_PASSWORD: ${{ secrets.RTLAB_ADMIN_PASSWORD }}
          RTLAB_AUTH_TOKEN: ${{ secrets.RTLAB_AUTH_TOKEN }}
          RTLAB_STAGING_ADMIN_PASSWORD: ${{ secrets.RTLAB_STAGING_ADMIN_PASSWORD }}
          RTLAB_STAGING_AUTH_TOKEN: ${{ secrets.RTLAB_STAGING_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          report_prefix="artifacts/staging_smoke_gha_${GITHUB_RUN_ID}"
          selected_auth_token="${RTLAB_STAGING_AUTH_TOKEN:-}"
          selected_admin_password="${RTLAB_STAGING_ADMIN_PASSWORD:-}"
          export RTLAB_ADMIN_PASSWORD="${selected_admin_password}"
          export RTLAB_PASSWORD="${selected_admin_password}"

          cmd=(
            python scripts/staging_smoke_report.py
            --backend-base-url "${BACKEND_BASE_URL}"
            --frontend-login-url "${FRONTEND_LOGIN_URL}"
            --username "${USERNAME}"
            --timeout-sec "${TIMEOUT_SEC}"
            --report-prefix "${report_prefix}"
          )

          if [[ "${REQUIRE_AUTH}" == "true" ]]; then
            cmd+=(--require-auth-checks)
          fi

          if [[ "${STRICT}" == "true" ]]; then
            cmd+=(--strict)
          else
            cmd+=(--no-strict)
          fi

          if [[ -n "${selected_auth_token}" ]]; then
            cmd+=(--auth-token "${selected_auth_token}")
          fi

          "${cmd[@]}" | tee artifacts/staging_smoke_stdout.log

      - name: Run Beast runtime probe
        if: ${{ github.event_name == 'schedule' || inputs.include_beast_probe }}
        env:
          BACKEND_BASE_URL: ${{ github.event_name == 'schedule' && 'https://bot-trading-ia-staging.up.railway.app' || inputs.backend_base_url }}
          USERNAME: ${{ github.event_name == 'schedule' && 'Wadmin' || inputs.username }}
          TIMEOUT_SEC: ${{ github.event_name == 'schedule' && 20 || inputs.timeout_sec }}
          BOOTSTRAP_DATASET: ${{ github.event_name == 'schedule' && 'false' || inputs.bootstrap_dataset }}
          BOOTSTRAP_START_MONTH: ${{ github.event_name == 'schedule' && '2024-01' || inputs.bootstrap_start_month }}
          BOOTSTRAP_END_MONTH: ${{ github.event_name == 'schedule' && '2024-12' || inputs.bootstrap_end_month }}
          RTLAB_STAGING_ADMIN_PASSWORD: ${{ secrets.RTLAB_STAGING_ADMIN_PASSWORD }}
          RTLAB_STAGING_AUTH_TOKEN: ${{ secrets.RTLAB_STAGING_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          report_prefix="artifacts/beast_runtime_status_gha_${GITHUB_RUN_ID}"
          export RTLAB_ADMIN_PASSWORD="${RTLAB_STAGING_ADMIN_PASSWORD:-}"

          cmd=(
            python scripts/beast_runtime_status_report.py
            --base-url "${BACKEND_BASE_URL}"
            --username "${USERNAME}"
            --market crypto
            --symbol BTCUSDT
            --timeframe 5m
            --timeout-sec "${TIMEOUT_SEC}"
            --report-prefix "${report_prefix}"
            --no-strict
          )

          if [[ "${BOOTSTRAP_DATASET}" == "true" ]]; then
            cmd+=(--bootstrap-crypto-public --bootstrap-start-month "${BOOTSTRAP_START_MONTH}" --bootstrap-end-month "${BOOTSTRAP_END_MONTH}")
          fi

          if [[ -n "${RTLAB_STAGING_AUTH_TOKEN:-}" ]]; then
            cmd+=(--auth-token "${RTLAB_STAGING_AUTH_TOKEN}")
          fi

          "${cmd[@]}" | tee artifacts/beast_runtime_stdout.log

      - name: Run Beast staging E2E
        if: ${{ inputs.include_beast_e2e }}
        env:
          BACKEND_BASE_URL: ${{ inputs.backend_base_url }}
          USERNAME: ${{ inputs.username }}
          TIMEOUT_SEC: ${{ inputs.timeout_sec }}
          BOOTSTRAP_DATASET: ${{ inputs.bootstrap_dataset }}
          BOOTSTRAP_START_MONTH: ${{ inputs.bootstrap_start_month }}
          BOOTSTRAP_END_MONTH: ${{ inputs.bootstrap_end_month }}
          BEAST_STRATEGY_ID: ${{ inputs.beast_strategy_id }}
          BEAST_USE_ORDERFLOW_DATA: ${{ inputs.beast_use_orderflow_data }}
          BEAST_MAX_WAIT_SEC: ${{ inputs.beast_max_wait_sec }}
          STRICT: ${{ inputs.strict }}
          RTLAB_STAGING_ADMIN_PASSWORD: ${{ secrets.RTLAB_STAGING_ADMIN_PASSWORD }}
          RTLAB_STAGING_AUTH_TOKEN: ${{ secrets.RTLAB_STAGING_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          report_prefix="artifacts/beast_staging_e2e_gha_${GITHUB_RUN_ID}"
          export RTLAB_ADMIN_PASSWORD="${RTLAB_STAGING_ADMIN_PASSWORD:-}"

          cmd=(
            python scripts/beast_staging_e2e_report.py
            --base-url "${BACKEND_BASE_URL}"
            --username "${USERNAME}"
            --market crypto
            --symbol BTCUSDT
            --timeframe 5m
            --start 2024-01-01
            --end 2024-03-31
            --strategy-id "${BEAST_STRATEGY_ID}"
            --report-prefix "${report_prefix}"
            --max-wait-sec "${BEAST_MAX_WAIT_SEC}"
          )

          if [[ "${BEAST_USE_ORDERFLOW_DATA}" == "true" ]]; then
            cmd+=(--use-orderflow-data)
          else
            cmd+=(--no-orderflow-data)
          fi

          if [[ "${BOOTSTRAP_DATASET}" == "true" ]]; then
            cmd+=(--bootstrap-crypto-public --bootstrap-start-month "${BOOTSTRAP_START_MONTH}" --bootstrap-end-month "${BOOTSTRAP_END_MONTH}")
          fi

          if [[ "${STRICT}" == "true" ]]; then
            cmd+=(--strict)
          else
            cmd+=(--no-strict)
          fi

          if [[ -n "${RTLAB_STAGING_AUTH_TOKEN:-}" ]]; then
            cmd+=(--auth-token "${RTLAB_STAGING_AUTH_TOKEN}")
          fi

          "${cmd[@]}" | tee artifacts/beast_staging_e2e_stdout.log

      - name: Build summary
        if: always()
        run: |
          set -euo pipefail
          latest_md="$(ls -1t artifacts/staging_smoke_gha_${GITHUB_RUN_ID}_*.md 2>/dev/null | head -n 1 || true)"
          if [[ -n "${latest_md}" && -f "${latest_md}" ]]; then
            {
              echo "## Staging Smoke"
              echo
              grep -E "^- front_login_ok:|^- health_ok:|^- health_mode:|^- runtime_ready_for_live:|^- bots_check_status:|^- overall_pass:" "${latest_md}" || true
              echo
              echo "Report file: ${latest_md}"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No staging-smoke report generated." >> "${GITHUB_STEP_SUMMARY}"
          fi
          latest_beast_md="$(ls -1t artifacts/beast_runtime_status_gha_${GITHUB_RUN_ID}_*.md 2>/dev/null | head -n 1 || true)"
          if [[ -n "${latest_beast_md}" && -f "${latest_beast_md}" ]]; then
            {
              echo
              echo "## Beast Runtime"
              echo
              grep -E "^- user_data_dir:|^- bootstrap_attempted:|^- bootstrap_ok:|^- policy_state:|^- policy_source_root:|^- data_root:|^- exact_dataset_present:|^- overall_pass:" "${latest_beast_md}" || true
              echo
              echo "Report file: ${latest_beast_md}"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
          latest_beast_e2e_md="$(ls -1t artifacts/beast_staging_e2e_gha_${GITHUB_RUN_ID}_*.md 2>/dev/null | head -n 1 || true)"
          if [[ -n "${latest_beast_e2e_md}" && -f "${latest_beast_e2e_md}" ]]; then
            {
              echo
              echo "## Beast E2E"
              echo
              grep -E "^- strategy_id:|^- market/symbol/timeframe:|^- run_id:|^- terminal_state:|^- overall_pass:" "${latest_beast_e2e_md}" || true
              echo
              echo "Report file: ${latest_beast_e2e_md}"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-${{ github.run_id }}
          path: |
            artifacts/staging_smoke_gha_${{ github.run_id }}_*.md
            artifacts/staging_smoke_gha_${{ github.run_id }}_*.json
            artifacts/staging_smoke_stdout.log
            artifacts/beast_runtime_status_gha_${{ github.run_id }}_*.md
            artifacts/beast_runtime_status_gha_${{ github.run_id }}_*.json
            artifacts/beast_runtime_stdout.log
            artifacts/beast_staging_e2e_gha_${{ github.run_id }}_*.md
            artifacts/beast_staging_e2e_gha_${{ github.run_id }}_*.json
            artifacts/beast_staging_e2e_stdout.log
          if-no-files-found: warn
