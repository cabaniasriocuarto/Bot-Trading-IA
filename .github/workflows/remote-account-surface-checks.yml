name: Remote Account Surface Checks (GitHub VM)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Backend base URL override
        required: false
        type: string
      username:
        description: Admin username override
        required: false
        type: string
      timeout_sec:
        description: HTTP timeout seconds
        required: false
        default: 20
        type: number

jobs:
  account-surface-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      INPUT_BASE_URL: ${{ inputs.base_url }}
      INPUT_USERNAME: ${{ inputs.username }}
      RTLAB_BASE_URL: ${{ secrets.RTLAB_BASE_URL }}
      RTLAB_ADMIN_USERNAME: ${{ secrets.RTLAB_ADMIN_USERNAME }}
      RTLAB_ADMIN_PASSWORD: ${{ secrets.RTLAB_ADMIN_PASSWORD }}
      RTLAB_AUTH_TOKEN: ${{ secrets.RTLAB_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Validate auth configuration
        run: |
          set -euo pipefail
          base_url="${INPUT_BASE_URL:-${RTLAB_BASE_URL:-}}"
          username="${INPUT_USERNAME:-${RTLAB_ADMIN_USERNAME:-}}"
          if [[ -z "${base_url}" ]]; then
            echo "Missing backend base URL: provide workflow input base_url or secret RTLAB_BASE_URL." >&2
            exit 1
          fi
          if [[ -z "${username}" ]]; then
            echo "Missing admin username: provide workflow input username or secret RTLAB_ADMIN_USERNAME." >&2
            exit 1
          fi
          if [[ -z "${RTLAB_ADMIN_PASSWORD:-}" && -z "${RTLAB_AUTH_TOKEN:-}" ]]; then
            echo "Missing auth secret: define RTLAB_AUTH_TOKEN or RTLAB_ADMIN_PASSWORD." >&2
            exit 1
          fi
          echo "BASE_URL=${base_url}" >> "${GITHUB_ENV}"
          echo "USERNAME=${username}" >> "${GITHUB_ENV}"

      - name: Run remote account surface report
        env:
          TIMEOUT_SEC: ${{ inputs.timeout_sec }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          report_prefix="artifacts/remote_account_surface_gha_${GITHUB_RUN_ID}"
          export RTLAB_PASSWORD="${RTLAB_ADMIN_PASSWORD:-}"

          cmd=(
            python scripts/remote_account_surface_report.py
            --base-url "${BASE_URL}"
            --username "${USERNAME}"
            --timeout-sec "${TIMEOUT_SEC}"
            --report-prefix "${report_prefix}"
            --warm-runtime
            --warm-symbol "BTCUSDT"
            --warm-wait-sec 6
            --start-paper-bot
            --paper-start-wait-sec 20
            --evaluate-paper
            --paper-orders-limit 20
          )

          if [[ -n "${RTLAB_AUTH_TOKEN:-}" ]]; then
            cmd+=(--auth-token "${RTLAB_AUTH_TOKEN}")
          fi

          "${cmd[@]}" | tee artifacts/remote_account_surface_stdout.log

      - name: Build summary
        if: always()
        run: |
          set -euo pipefail
          latest_md="$(ls -1t artifacts/remote_account_surface_gha_${GITHUB_RUN_ID}_*.md 2>/dev/null | head -n 1 || true)"
          if [[ -n "${latest_md}" && -f "${latest_md}" ]]; then
            {
              echo "## Remote Account Surface Checks"
              echo
              grep -E "^- auth_ok:|^- account_capabilities_summary_ok:|^- validation_readiness_ok:|^- live_safety_ok:|^- gates_ok:|^- overall_status:|^- g9_status:" "${latest_md}" || true
              echo
              echo "Report file: ${latest_md}"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No remote-account-surface report generated." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-account-surface-${{ github.run_id }}
          path: |
            artifacts/remote_account_surface_gha_${{ github.run_id }}_*.md
            artifacts/remote_account_surface_gha_${{ github.run_id }}_*.json
            artifacts/remote_account_surface_stdout.log
          if-no-files-found: warn
