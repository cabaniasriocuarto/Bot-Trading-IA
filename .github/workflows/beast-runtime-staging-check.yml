name: Beast Runtime Staging Check (GitHub VM)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Backend staging base URL
        required: true
        default: https://bot-trading-ia-staging.up.railway.app
        type: string
      username:
        description: Admin username
        required: true
        default: Wadmin
        type: string
      market:
        description: Market
        required: true
        default: crypto
        type: string
      symbol:
        description: Symbol
        required: true
        default: BTCUSDT
        type: string
      timeframe:
        description: Timeframe
        required: true
        default: 5m
        type: string
      timeout_sec:
        description: HTTP timeout seconds
        required: true
        default: 20
        type: number
      strict:
        description: Fail workflow if Beast runtime remains broken
        required: true
        default: true
        type: boolean

jobs:
  beast-runtime-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Validate auth configuration
        env:
          RTLAB_STAGING_ADMIN_PASSWORD: ${{ secrets.RTLAB_STAGING_ADMIN_PASSWORD }}
          RTLAB_STAGING_AUTH_TOKEN: ${{ secrets.RTLAB_STAGING_AUTH_TOKEN }}
        run: |
          if [[ -z "${RTLAB_STAGING_ADMIN_PASSWORD:-}" && -z "${RTLAB_STAGING_AUTH_TOKEN:-}" ]]; then
            echo "Missing staging secrets: set RTLAB_STAGING_AUTH_TOKEN or RTLAB_STAGING_ADMIN_PASSWORD." >&2
            exit 1
          fi

      - name: Run Beast runtime report
        env:
          BASE_URL: ${{ inputs.base_url }}
          USERNAME: ${{ inputs.username }}
          MARKET: ${{ inputs.market }}
          SYMBOL: ${{ inputs.symbol }}
          TIMEFRAME: ${{ inputs.timeframe }}
          TIMEOUT_SEC: ${{ inputs.timeout_sec }}
          STRICT: ${{ inputs.strict }}
          RTLAB_ADMIN_PASSWORD: ${{ secrets.RTLAB_STAGING_ADMIN_PASSWORD }}
          RTLAB_STAGING_AUTH_TOKEN: ${{ secrets.RTLAB_STAGING_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          report_prefix="artifacts/beast_runtime_status_gha_${GITHUB_RUN_ID}"

          cmd=(
            python scripts/beast_runtime_status_report.py
            --base-url "${BASE_URL}"
            --username "${USERNAME}"
            --market "${MARKET}"
            --symbol "${SYMBOL}"
            --timeframe "${TIMEFRAME}"
            --timeout-sec "${TIMEOUT_SEC}"
            --report-prefix "${report_prefix}"
          )

          if [[ "${STRICT}" == "true" ]]; then
            cmd+=(--strict)
          else
            cmd+=(--no-strict)
          fi

          if [[ -n "${RTLAB_STAGING_AUTH_TOKEN:-}" ]]; then
            cmd+=(--auth-token "${RTLAB_STAGING_AUTH_TOKEN}")
          fi

          "${cmd[@]}" | tee artifacts/beast_runtime_stdout.log

      - name: Build summary
        if: always()
        run: |
          set -euo pipefail
          latest_md="$(ls -1t artifacts/beast_runtime_status_gha_${GITHUB_RUN_ID}_*.md 2>/dev/null | head -n 1 || true)"
          if [[ -n "${latest_md}" && -f "${latest_md}" ]]; then
            {
              echo "## Beast Runtime Staging Check"
              echo
              grep -E "^- user_data_dir:|^- policy_state:|^- policy_source_root:|^- data_root:|^- exact_dataset_present:|^- overall_pass:" "${latest_md}" || true
              echo
              echo "Report file: ${latest_md}"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No beast-runtime report generated." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beast-runtime-staging-${{ github.run_id }}
          path: |
            artifacts/beast_runtime_status_gha_${{ github.run_id }}_*.md
            artifacts/beast_runtime_status_gha_${{ github.run_id }}_*.json
            artifacts/beast_runtime_stdout.log
          if-no-files-found: warn
