name: Production Storage Durability

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Backend base URL
        required: true
        default: https://bot-trading-ia-production.up.railway.app
        type: string
      username:
        description: Admin username
        required: true
        default: Wadmin
        type: string
      symbol:
        description: Symbol to bootstrap/verify
        required: true
        default: BTCUSDT
        type: string
      market_family:
        description: Binance futures market family
        required: true
        default: usdm
        type: choice
        options:
          - usdm
          - coinm
      start_month:
        description: Bootstrap start month
        required: true
        default: 2024-01
        type: string
      end_month:
        description: Bootstrap end month
        required: true
        default: 2024-12
        type: string
      post_bootstrap_wait_sec:
        description: Wait before rechecking dataset durability
        required: true
        default: 30
        type: number

jobs:
  storage-durability:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Validate auth configuration
        env:
          RTLAB_ADMIN_PASSWORD: ${{ secrets.RTLAB_ADMIN_PASSWORD }}
          RTLAB_AUTH_TOKEN: ${{ secrets.RTLAB_AUTH_TOKEN }}
        run: |
          if [[ -z "${RTLAB_ADMIN_PASSWORD:-}" && -z "${RTLAB_AUTH_TOKEN:-}" ]]; then
            echo "Missing production/default secrets: define RTLAB_AUTH_TOKEN or RTLAB_ADMIN_PASSWORD." >&2
            exit 1
          fi

      - name: Check mounted storage gate
        env:
          BASE_URL: ${{ inputs.base_url }}
          USERNAME: ${{ inputs.username }}
          RTLAB_ADMIN_PASSWORD: ${{ secrets.RTLAB_ADMIN_PASSWORD }}
          RTLAB_AUTH_TOKEN: ${{ secrets.RTLAB_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python scripts/check_storage_persistence.py \
            --base-url "${BASE_URL}" \
            --username "${USERNAME}" \
            --auth-token "${RTLAB_AUTH_TOKEN:-}" \
            --require-persistent | tee artifacts/storage_persistence_stdout.log

      - name: Bootstrap and verify BTCUSDT durability
        env:
          BASE_URL: ${{ inputs.base_url }}
          USERNAME: ${{ inputs.username }}
          SYMBOL: ${{ inputs.symbol }}
          MARKET_FAMILY: ${{ inputs.market_family }}
          START_MONTH: ${{ inputs.start_month }}
          END_MONTH: ${{ inputs.end_month }}
          POST_WAIT_SEC: ${{ inputs.post_bootstrap_wait_sec }}
          RTLAB_ADMIN_PASSWORD: ${{ secrets.RTLAB_ADMIN_PASSWORD }}
          RTLAB_AUTH_TOKEN: ${{ secrets.RTLAB_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          report_prefix="artifacts/beast_runtime_production_durability_${GITHUB_RUN_ID}"
          python scripts/beast_runtime_status_report.py \
            --base-url "${BASE_URL}" \
            --username "${USERNAME}" \
            --auth-token "${RTLAB_AUTH_TOKEN:-}" \
            --market crypto \
            --symbol "${SYMBOL}" \
            --timeframe 5m \
            --bootstrap-futures-public \
            --bootstrap-market-family "${MARKET_FAMILY}" \
            --bootstrap-start-month "${START_MONTH}" \
            --bootstrap-end-month "${END_MONTH}" \
            --bootstrap-resample-timeframes 5m 15m 1h 4h 1d \
            --post-bootstrap-wait-sec "${POST_WAIT_SEC}" \
            --require-mounted-storage \
            --require-exact-dataset \
            --report-prefix "${report_prefix}" \
            --strict | tee artifacts/beast_runtime_production_stdout.log

      - name: Build summary
        if: always()
        run: |
          set -euo pipefail
          latest_md="$(ls -1t artifacts/beast_runtime_production_durability_${GITHUB_RUN_ID}_*.md 2>/dev/null | head -n 1 || true)"
          {
            echo "## Production Storage Durability"
            echo
            if [[ -f "${latest_md}" ]]; then
              grep -E "^- user_data_dir:|^- configured_user_data_dir:|^- persistent_storage:|^- mount_detected:|^- mount_point:|^- bootstrap_ok:|^- exact_dataset_present:|^- post_wait_exact_dataset_present:|^- overall_pass:" "${latest_md}" || true
              echo
              echo "Report file: ${latest_md}"
            else
              echo "No durability report generated."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-storage-durability-${{ github.run_id }}
          path: |
            artifacts/storage_persistence_stdout.log
            artifacts/beast_runtime_production_stdout.log
            artifacts/beast_runtime_production_durability_${{ github.run_id }}_*.md
            artifacts/beast_runtime_production_durability_${{ github.run_id }}_*.json
          if-no-files-found: warn
