gates:
  pbo:
    enabled: true
    reject_if_gt: 0.05
    metric: "sharpe"
    cscv:
      S: 8
      bootstrap_iters: 2000

  dsr:
    enabled: true
    min_dsr: 0.95
    require_trials_stats: true

  walk_forward:
    enabled: true
    folds: 5
    pass_if_positive_folds_at_least: 4
    max_is_to_oos_degradation: 0.30

  holdout_warnings:
    enabled: true
    min_observations_for_holdout: 1000
    weekly_strategy_min_years_for_holdout: 20

  cost_stress:
    enabled: true
    multipliers: [1.5, 2.0]
    must_remain_profitable_at_1_5x: true
    max_score_drop_at_2_0x: 0.50

  min_trade_quality:
    enabled: true
    min_trades_per_run: 150
    min_trades_per_symbol: 30

  # Ajustes surrogate para research:
  # - Por defecto apagado.
  # - Solo permitido en modo "demo".
  # - Si se usa, nunca debe quedar promotable (fail-closed para promotion).
  surrogate_adjustments:
    enabled: false
    allow_request_override: false
    allowed_execution_modes: ["demo"]
    promotion_blocked: true

  source_weights:
    legacy_untrusted: 0.00
    backtest_is: 0.05
    backtest_oos: 0.20
    walk_forward: 0.35
    cpcv: 0.45
    shadow: 0.60
    paper: 0.75
    testnet: 0.85
    live: 1.00

  freshness_half_life_days:
    backtest_oos: 90
    walk_forward: 120
    cpcv: 120
    shadow: 45
    paper: 60
    testnet: 75
    live: 180

  stale_windows_days:
    backtest_oos: 180
    walk_forward: 180
    cpcv: 180
    shadow: 90
    paper: 90
    testnet: 90
    live: 365

  evidence_quality:
    require_dataset_hash: true
    require_dataset_source: true
    require_costs_complete: true
    require_no_lookahead: true
    require_no_leakage: true
    default_min_trades: 100

  brain_policy:
    exact_bot_threshold_trades: 50
    exact_bot_threshold_effective_weight: 5.0
    blend_if_sufficient:
      exact_bot: 0.55
      pool_context: 0.25
      global_truth: 0.20
    blend_if_insufficient:
      exact_bot: 0.25
      pool_context: 0.35
      global_truth: 0.40

  promotion:
    candidate:
      min_trades_oos: 100
      min_psr: 0.95
      min_dsr: 0.80
      max_pbo: 0.30
      max_dd: 0.20
      require_complete_costs: true
      require_no_lookahead: true
      require_no_leakage: true
    shadow_or_paper:
      min_trades_oos: 150
      min_psr: 0.97
      min_dsr: 0.85
      max_pbo: 0.25
      max_is_to_oos_degradation: 0.40
    testnet_or_live_small:
      require_shadow_consistency: true
      require_paper_consistency: true
      require_realized_slippage_reasonable: true
      require_human_approval: true

  quarantine:
    pbo_gt: 0.40
    dsr_lt: 0.60
    dd_strategy_gt: 0.06
    dd_bot_gt: 0.08
    require_complete_provenance: true

  market_catalog:
    providers:
      binance:
        enabled: true
        sync_on_startup: true
        sync_schedule_minutes: 1440
        families:
          spot: true
          margin: true
          usdm_futures: true
          coinm_futures: true
        keep_delisted_history: true
        include_only_tradable: true
        fail_closed_on_missing_metadata: true

  market_data:
    providers:
      binance:
        enabled: true
        sync_reference_on_startup: true
        sync_market_data_on_startup: false
        historical_backfill_enabled: true
        websocket_live_enabled: true
        rest_fallback_enabled: true
    history:
      store_klines: true
      store_agg_trades: true
      store_depth_snapshots: true
      store_mark_price: true
      store_index_price: true
      store_funding_rate: true
      store_open_interest: true
      store_sentiment_optional: false
    dataset_build:
      require_catalog_hash: true
      require_source_snapshot: true
      require_data_quality_flags: true
    live_parity:
      require_recent_reference_data: true
      require_recent_market_state: true
      require_recent_spread_proxy: true
      require_mark_price_for_derivatives: true
      require_funding_for_derivatives_if_strategy_uses_it: true

  execution_modes:
    backtest:
      enabled: true
    paper:
      enabled: true
    test:
      enabled: true
    demo:
      enabled: true
    live:
      enabled: true
      require_account_capability_check: true
      require_symbol_validation: true
      require_risk_validation: true
      require_microstructure_validation: true
      require_execution_profile: true
      require_human_approval_if_configured: true

  execution_symbol_validation:
    enforce_tick_size: true
    enforce_step_size: true
    enforce_min_qty: true
    enforce_min_notional: true
    reject_if_status_not_trading: true

  universe_policy:
    defaults:
      active_only: true
      tradable_only: true
      backtestable_only: true
      live_only_if_execution_enabled: true
      require_tick_and_step: true
      require_min_trade_rules: true

  observability:
    telemetry:
      structured_logs: true
      metrics: true
      traces: true
      correlation_ids: true
    alerts:
      websocket_down: true
      stale_market_state: true
      stale_reference_data: true
      order_rejection_spike: true
      slippage_spike: true
      spread_blowout: true
      toxicity_spike: true
      impact_blowout: true
      reconciliation_mismatch: true
      drawdown_breach: true
      drift_severe: true
      feature_integrity_failure: true
      rate_limit_stress: true
      kill_switch_activated: true
    drift:
      psi_enabled: true
      ks_enabled: true
      missingness_drift_enabled: true
      categorical_ratio_drift_enabled: true
    health_scoring:
      enabled: true
      weights:
        data: 0.20
        research: 0.10
        brain: 0.15
        execution: 0.20
        live: 0.20
        risk: 0.10
        observability: 0.05
