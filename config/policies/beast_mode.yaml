beast_mode:
  enabled: true
  requires_postgres: true
  max_trials_per_batch: 5000
  max_concurrent_jobs: 50

  per_exchange_rate_limit:
    enabled: true
    max_requests_per_minute: 1200

  budget_governor:
    enabled: true
    daily_job_cap_hobby: 200
    daily_job_cap_pro: 800
    stop_at_budget_pct: 80

  research_funnel:
    persist_all_trials: true
    mark_legacy_if_metadata_missing: true
    require_dataset_hash_for_promotable: true
    require_cost_profile_for_promotable: true
    require_execution_model_for_promotable: true

  multiple_testing_controls:
    pbo_enabled: true
    dsr_enabled: true
    psr_enabled: true
    cpcv_enabled: true
